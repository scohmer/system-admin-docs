[defaults]
# Path where Ansible writes a full log of all playbook output.
# Change this to a network-mounted path for centralised logging, e.g.:
#   log_path = /mnt/ansible-logs/ansible.log
log_path = /var/log/ansible/ansible.log

host_key_checking   = False
retry_files_enabled = False
stdout_callback     = yaml
interpreter_python  = auto_silent

# Directory where per-playbook run logs are written by the pre_tasks logging block.
# Override at runtime:  -e playbook_log_dir=/mnt/ansible-logs/runs
# Point this to a network share mount for centralised run logging.
# playbook_log_dir is consumed by the pre_tasks block present in each playbook.

[ssh_connection]
pipelining = True
