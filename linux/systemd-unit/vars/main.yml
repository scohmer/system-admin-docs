---
target_hosts: all

systemd_units:
  - name: myapp
    description: "My Application Service"
    exec_start: /usr/local/bin/myapp --config /etc/myapp/config.yaml
    user: myapp
    group: myapp
    working_dir: /opt/myapp
    restart: on-failure
    restart_sec: 5
    after:
      - network.target
    wanted_by: multi-user.target
    state: started
    enabled: true
    environment:
      APP_ENV: production
      LOG_LEVEL: info
    # exec_stop: /usr/local/bin/myapp --shutdown

