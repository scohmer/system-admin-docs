---
- name: Systemd Unit File Management
  hosts: "{{ target_hosts }}"
  become: true
  gather_facts: true
  vars_files:
    - vars/main.yml

  pre_tasks:
    - name: Log playbook run start to controller
      ansible.builtin.lineinfile:
        path: "{{ playbook_log_dir | default('/var/log/ansible/playbook-runs') }}/{{ ansible_play_name | lower | replace(' ', '-') }}.log"
        line: "[{{ ansible_date_time.iso8601 }}] STARTED on {{ inventory_hostname }} by {{ lookup('env', 'USER') | default('ansible', true) }}"
        create: true
        mode: '0644'
      delegate_to: localhost

  tasks:
    - name: Deploy systemd unit files
      ansible.builtin.template:
        src: service.unit.j2
        dest: "/etc/systemd/system/{{ item.name }}.service"
        owner: root
        group: root
        mode: '0644'
      loop: "{{ systemd_units }}"
      notify: Daemon reload

    - name: Flush handlers (ensure daemon reload happens before managing services)
      ansible.builtin.meta: flush_handlers

    - name: Manage systemd service state and enabled status
      ansible.builtin.systemd:
        name: "{{ item.name }}.service"
        state: "{{ item.state | default('started') }}"
        enabled: "{{ item.enabled | default(true) }}"
      loop: "{{ systemd_units }}"

  handlers:
    - name: Daemon reload
      ansible.builtin.systemd:
        daemon_reload: true
