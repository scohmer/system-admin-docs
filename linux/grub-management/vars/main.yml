---
target_hosts: all

grub_timeout: 5
grub_default: 0

# Kernel parameters to add to GRUB_CMDLINE_LINUX
# Examples: mitigations=auto, audit=1, quiet, splash
grub_cmdline_add: []
  # - "audit=1"
  # - "mitigations=auto"

# GRUB password protection
# Generate hash: grub-mkpasswd-pbkdf2
grub_password_enable: false
grub_password_hash: ""
  # Example hash format:
  # "grub.pbkdf2.sha512.10000.LONG_HASH_STRING"
