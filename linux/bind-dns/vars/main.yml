---
target_hosts: all

bind_listen_on: "any"
bind_allow_query: "localhost; 192.168.1.0/24"
bind_allow_recursion: "localhost; 192.168.1.0/24"

# Upstream forwarders (for recursive queries)
bind_forwarders:
  - "8.8.8.8"
  - "8.8.4.4"

bind_firewall_manage: true

# Authoritative zones to serve
bind_zones: []
