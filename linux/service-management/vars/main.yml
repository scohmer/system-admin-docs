---
# =============================================================================
# Service Management Variables
# Populate these variables before running the playbook.
# See README.md for full documentation of each variable.
# =============================================================================

# Target hosts or group from your Ansible inventory
target_hosts: all

# Services to manage
# state: started | stopped | restarted | reloaded
# enabled: true | false  (whether to enable at boot)
services:
  - name: sshd
    state: started
    enabled: true

