---
- name: Docker Engine Management
  hosts: "{{ target_hosts }}"
  become: true
  gather_facts: true
  vars_files:
    - vars/main.yml

  pre_tasks:
    - name: Log playbook run start to controller
      ansible.builtin.lineinfile:
        path: "{{ playbook_log_dir | default('/var/log/ansible/playbook-runs') }}/{{ ansible_play_name | lower | replace(' ', '-') }}.log"
        line: "[{{ ansible_date_time.iso8601 }}] STARTED on {{ inventory_hostname }} by {{ lookup('env', 'USER') | default('ansible', true) }}"
        create: true
        mode: '0644'
      delegate_to: localhost

  tasks:
    # ── Install Docker (Debian) ─────────────────────────────────────────────
    - name: Install Docker dependencies (Debian)
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Add Docker GPG key (Debian)
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg | \
          gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg
      when: ansible_os_family == "Debian"

    - name: Add Docker apt repository (Debian)
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/{{ ansible_distribution | lower }} \
        $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list
      when: ansible_os_family == "Debian"

    - name: Install Docker Engine (Debian)
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      when:
        - ansible_os_family == "Debian"
        - docker_install_compose | bool

    # ── Install Docker (RedHat) ─────────────────────────────────────────────
    - name: Add Docker repository (RedHat)
      ansible.builtin.command: >
        dnf config-manager --add-repo
        https://download.docker.com/linux/centos/docker-ce.repo
      args:
        creates: /etc/yum.repos.d/docker-ce.repo
      when: ansible_os_family == "RedHat"

    - name: Install Docker Engine (RedHat)
      ansible.builtin.dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      when: ansible_os_family == "RedHat"

    # ── Configure Docker daemon ─────────────────────────────────────────────
    - name: Configure Docker daemon
      ansible.builtin.copy:
        content: "{{ docker_daemon_config | to_nice_json }}"
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: '0644'
      when: docker_daemon_config | length > 0
      notify: Restart Docker

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # ── Manage Docker group membership ──────────────────────────────────────
    - name: Add users to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"
      when: docker_users | length > 0

    # ── Deploy Docker Compose projects ──────────────────────────────────────
    - name: Create Compose project directories
      ansible.builtin.file:
        path: "{{ item.dir }}"
        state: directory
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: '0755'
      loop: "{{ docker_compose_projects }}"
      when: docker_compose_projects | length > 0

    - name: Deploy docker-compose.yml files
      ansible.builtin.copy:
        src: "{{ item.compose_src }}"
        dest: "{{ item.dir }}/docker-compose.yml"
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: '0644'
      loop: "{{ docker_compose_projects }}"
      when:
        - docker_compose_projects | length > 0
        - item.compose_src is defined

    - name: Start Docker Compose projects
      community.docker.docker_compose_v2:
        project_src: "{{ item.dir }}"
        state: present
        pull: always
      loop: "{{ docker_compose_projects }}"
      when:
        - docker_compose_projects | length > 0
        - docker_install_compose | bool

  handlers:
    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
