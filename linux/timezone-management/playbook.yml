---
- name: Timezone Management
  hosts: "{{ target_hosts }}"
  become: true
  gather_facts: true
  vars_files:
    - vars/main.yml

  pre_tasks:
    - name: Log playbook run start to controller
      ansible.builtin.lineinfile:
        path: "{{ playbook_log_dir | default('/var/log/ansible/playbook-runs') }}/{{ ansible_play_name | lower | replace(' ', '-') }}.log"
        line: "[{{ ansible_date_time.iso8601 }}] STARTED on {{ inventory_hostname }} by {{ lookup('env', 'USER') | default('ansible', true) }}"
        create: true
        mode: '0644'
      delegate_to: localhost

  tasks:
    - name: Set system timezone
      community.general.timezone:
        name: "{{ system_timezone }}"

    - name: Sync hardware clock to UTC
      ansible.builtin.command: hwclock --systohc --utc
      when: hwclock_sync | bool
      changed_when: true

    - name: Verify timezone setting
      ansible.builtin.command: timedatectl show --property=Timezone --value
      register: tz_verify
      changed_when: false

    - name: Display current timezone
      ansible.builtin.debug:
        msg: "System timezone is now: {{ tz_verify.stdout }}"
