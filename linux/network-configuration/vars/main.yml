---
# =============================================================================
# Network Configuration Variables
# Populate these variables before running the playbook.
# See README.md for full documentation and safety notes.
# WARNING: Changing the active SSH interface IP will disconnect Ansible.
# =============================================================================

# Target hosts or group from your Ansible inventory
target_hosts: all

# Set system hostname (leave empty "" to skip)
hostname: ""

# Global DNS servers (applied to all interfaces unless overridden per-interface)
dns_servers: []
# Example:
# dns_servers:
#   - 8.8.8.8
#   - 8.8.4.4

# Network interface configurations
network_interfaces: []
# Examples:
# network_interfaces:
#   # Static IP configuration
#   - name: eth0
#     type: ethernet
#     address: 192.168.1.100/24
#     gateway: 192.168.1.1
#     dns:
#       - 192.168.1.1
#       - 8.8.8.8
#     state: present
#     autoconnect: true
#
#   # DHCP configuration (omit address and gateway)
#   - name: eth1
#     type: ethernet
#     state: present
#     autoconnect: true
