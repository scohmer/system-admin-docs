---
target_hosts: all

rsync_log_dir: /var/log/rsync-backup

# Backup job definitions
rsync_backup_jobs:
  - name: home-backup
    src: /home/
    dest: /mnt/backup/home/
    options: "-avz --delete"
    schedule:
      minute: "0"
      hour: "2"
    exclude:
      - "*.cache"
      - ".Trash-*"

