---
target_hosts: all

# Action: list | create | remove
lvm_snapshot_action: list

# Snapshot definitions
lvm_snapshots:
  - origin_lv: /dev/vg0/root
    snapshot_name: root-snap-prechange
    size: 5G
    # mount_point: /mnt/root-snapshot
    # fstype: xfs

