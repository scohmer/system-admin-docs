---
target_hosts: all

ssh_banner_enabled: true
motd_dynamic: true
motd_disable_default: true

# SSH pre-login legal notice (displayed before authentication)
ssh_banner_content: |
  ############################################################
  #                  AUTHORIZED ACCESS ONLY                  #
  #                                                          #
  #  This system is the property of Acme Corporation.        #
  #  Unauthorized access is strictly prohibited and subject  #
  #  to criminal and civil penalties.                        #
  #                                                          #
  #  All activity on this system is monitored and logged.    #
  #  By connecting, you consent to this monitoring.          #
  ############################################################

# Static MOTD content (used when motd_dynamic is false)
motd_content: |
  Welcome to {{ inventory_hostname }}
  Managed by Ansible — see your system administrator for access issues.
