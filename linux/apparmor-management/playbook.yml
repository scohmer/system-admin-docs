---
- name: AppArmor Management
  hosts: "{{ target_hosts }}"
  become: true
  gather_facts: true
  vars_files:
    - vars/main.yml

  tasks:
    - name: Fail if not a Debian-family system
      ansible.builtin.fail:
        msg: "AppArmor management is supported on Debian-family systems. Use selinux-management for RHEL."
      when: ansible_os_family != "Debian"

    - name: Install AppArmor packages
      ansible.builtin.apt:
        name:
          - apparmor
          - apparmor-utils
          - apparmor-profiles
          - apparmor-profiles-extra
        state: present
        update_cache: true

    - name: Install extra AppArmor packages
      ansible.builtin.apt:
        name: "{{ apparmor_extra_packages }}"
        state: present
      when: apparmor_extra_packages | length > 0

    - name: Ensure AppArmor service is enabled and running
      ansible.builtin.systemd:
        name: apparmor
        enabled: true
        state: started

    - name: Set profiles to enforce mode
      ansible.builtin.command: aa-enforce {{ item }}
      loop: "{{ apparmor_profiles_enforce }}"
      when: apparmor_profiles_enforce | length > 0
      changed_when: true

    - name: Set profiles to complain mode
      ansible.builtin.command: aa-complain {{ item }}
      loop: "{{ apparmor_profiles_complain }}"
      when: apparmor_profiles_complain | length > 0
      changed_when: true

    - name: Disable profiles
      ansible.builtin.command: aa-disable {{ item }}
      loop: "{{ apparmor_profiles_disable }}"
      when: apparmor_profiles_disable | length > 0
      changed_when: true

    - name: Reload AppArmor profiles
      ansible.builtin.command: apparmor_parser -r /etc/apparmor.d/
      changed_when: true

    - name: Show AppArmor status
      ansible.builtin.command: aa-status --pretty-json
      register: aa_status
      changed_when: false

    - name: Display AppArmor profile summary
      ansible.builtin.debug:
        msg: "AppArmor status collected. Check /var/log/syslog or journalctl for audit events."
