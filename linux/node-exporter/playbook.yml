---
- name: Deploy Prometheus Node Exporter
  hosts: "{{ target_hosts }}"
  become: true
  gather_facts: true
  vars_files:
    - vars/main.yml

  tasks:
    - name: Create node_exporter system user
      ansible.builtin.user:
        name: "{{ node_exporter_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false
        comment: "Prometheus Node Exporter"

    - name: Download node_exporter tarball
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
        mode: '0644'

    - name: Extract node_exporter tarball
      ansible.builtin.unarchive:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
        dest: /tmp/node_exporter-extract/
        remote_src: true
        creates: "/tmp/node_exporter-extract/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"

    - name: Copy node_exporter binary to /usr/local/bin
      ansible.builtin.copy:
        src: "/tmp/node_exporter-extract/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        owner: root
        group: root
        mode: '0755'
        remote_src: true
      notify: Restart node_exporter

    - name: Deploy node_exporter systemd unit file
      ansible.builtin.template:
        src: node_exporter.service.j2
        dest: /etc/systemd/system/node_exporter.service
        owner: root
        group: root
        mode: '0644'
      notify: Restart node_exporter

    - name: Enable and start node_exporter service
      ansible.builtin.systemd:
        name: node_exporter
        enabled: true
        state: started
        daemon_reload: true

    - name: Open node_exporter port in firewalld (RedHat)
      ansible.posix.firewalld:
        port: "{{ node_exporter_port }}/tcp"
        permanent: true
        state: enabled
        immediate: true
      when:
        - ansible_os_family == "RedHat"
        - node_exporter_firewall_manage | bool

    - name: Open node_exporter port in UFW (Debian)
      community.general.ufw:
        rule: allow
        port: "{{ node_exporter_port }}"
        proto: tcp
      when:
        - ansible_os_family == "Debian"
        - node_exporter_firewall_manage | bool

  handlers:
    - name: Restart node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        state: restarted
