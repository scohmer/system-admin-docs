---
target_hosts: all

wg_interface: wg0
wg_port: 51820
wg_address: "10.10.0.1/24"
wg_enable_ip_forward: true

# Private key — MUST be encrypted with Ansible Vault in production
# Generate: wg genkey | ansible-vault encrypt_string --stdin-name wg_private_key
wg_private_key: "ChangeMe_UseVaultForRealKey"

# Post-up/down iptables rules for NAT (needed for gateway/server mode)
wg_post_up: "iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE"
wg_post_down: "iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE"

# VPN peers (clients or other servers)
# public_key: peer's public key (wg pubkey < privatekey)
# allowed_ips: routes accepted from/to this peer
wg_peers: []
