---
- name: WireGuard VPN Configuration
  hosts: "{{ target_hosts }}"
  become: true
  gather_facts: true
  vars_files:
    - vars/main.yml

  pre_tasks:
    - name: Log playbook run start to controller
      ansible.builtin.lineinfile:
        path: "{{ playbook_log_dir | default('/var/log/ansible/playbook-runs') }}/{{ ansible_play_name | lower | replace(' ', '-') }}.log"
        line: "[{{ ansible_date_time.iso8601 }}] STARTED on {{ inventory_hostname }} by {{ lookup('env', 'USER') | default('ansible', true) }}"
        create: true
        mode: '0644'
      delegate_to: localhost

  tasks:
    - name: Install WireGuard (Debian)
      ansible.builtin.apt:
        name: wireguard
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install WireGuard (RedHat)
      ansible.builtin.dnf:
        name:
          - wireguard-tools
          - kernel-modules-extra
        state: present
      when: ansible_os_family == "RedHat"

    - name: Enable IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_file: /etc/sysctl.d/99-wireguard.conf
        state: present
        reload: true
      when: wg_enable_ip_forward | bool

    - name: Create WireGuard configuration directory
      ansible.builtin.file:
        path: /etc/wireguard
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Deploy WireGuard configuration
      ansible.builtin.template:
        src: wg.conf.j2
        dest: "/etc/wireguard/{{ wg_interface }}.conf"
        owner: root
        group: root
        mode: '0600'
      notify: Restart WireGuard

    - name: Enable and start WireGuard
      ansible.builtin.systemd:
        name: "wg-quick@{{ wg_interface }}"
        enabled: true
        state: started

    - name: Open WireGuard port in firewalld (RedHat)
      ansible.posix.firewalld:
        port: "{{ wg_port }}/udp"
        permanent: true
        state: enabled
        immediate: true
      when: ansible_os_family == "RedHat"

    - name: Open WireGuard port in UFW (Debian)
      community.general.ufw:
        rule: allow
        port: "{{ wg_port }}"
        proto: udp
      when: ansible_os_family == "Debian"

  handlers:
    - name: Restart WireGuard
      ansible.builtin.systemd:
        name: "wg-quick@{{ wg_interface }}"
        state: restarted
