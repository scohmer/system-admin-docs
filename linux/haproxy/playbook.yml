---
- name: Install and Configure HAProxy
  hosts: "{{ target_hosts }}"
  become: true
  gather_facts: true
  vars_files:
    - vars/main.yml

  pre_tasks:
    - name: Log playbook run start to controller
      ansible.builtin.lineinfile:
        path: "{{ playbook_log_dir | default('/var/log/ansible/playbook-runs') }}/{{ ansible_play_name | lower | replace(' ', '-') }}.log"
        line: "[{{ ansible_date_time.iso8601 }}] STARTED on {{ inventory_hostname }} by {{ lookup('env', 'USER') | default('ansible', true) }}"
        create: true
        mode: '0644'
      delegate_to: localhost

  tasks:
    - name: Install HAProxy (Debian)
      ansible.builtin.apt:
        name: haproxy
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install HAProxy (RedHat)
      ansible.builtin.dnf:
        name: haproxy
        state: present
      when: ansible_os_family == "RedHat"

    - name: Deploy HAProxy configuration
      ansible.builtin.template:
        src: haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
        owner: root
        group: root
        mode: '0644'
        backup: true
        validate: haproxy -c -f %s
      notify: Reload HAProxy

    - name: Enable and start HAProxy service
      ansible.builtin.systemd:
        name: haproxy
        enabled: true
        state: started

    - name: Open frontend ports in firewalld (RedHat)
      ansible.posix.firewalld:
        port: "{{ item.bind | regex_replace('.*:(\\d+).*', '\\1') }}/tcp"
        permanent: true
        state: enabled
        immediate: true
      loop: "{{ haproxy_frontends }}"
      when:
        - ansible_os_family == "RedHat"
        - haproxy_firewall_manage | bool

    - name: Open stats port in firewalld (RedHat)
      ansible.posix.firewalld:
        port: "{{ haproxy_stats_port }}/tcp"
        permanent: true
        state: enabled
        immediate: true
      when:
        - ansible_os_family == "RedHat"
        - haproxy_firewall_manage | bool
        - haproxy_stats_enable | bool

    - name: Open frontend ports in UFW (Debian)
      community.general.ufw:
        rule: allow
        port: "{{ item.bind | regex_replace('.*:(\\d+).*', '\\1') }}"
        proto: tcp
      loop: "{{ haproxy_frontends }}"
      when:
        - ansible_os_family == "Debian"
        - haproxy_firewall_manage | bool

    - name: Open stats port in UFW (Debian)
      community.general.ufw:
        rule: allow
        port: "{{ haproxy_stats_port }}"
        proto: tcp
      when:
        - ansible_os_family == "Debian"
        - haproxy_firewall_manage | bool
        - haproxy_stats_enable | bool

  handlers:
    - name: Reload HAProxy
      ansible.builtin.systemd:
        name: haproxy
        state: reloaded
