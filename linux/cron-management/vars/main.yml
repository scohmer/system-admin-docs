#     user: root
#     job: "/usr/local/bin/backup.sh >> /var/log/backup.log 2>&1"
#     minute: "0"
#     hour: "2"
#     day: "*"
#     month: "*"
#     weekday: "*"
#     state: present
#
#   # Check disk usage every 15 minutes
#   - name: "Disk usage check"
#     user: root
#     job: "df -h >> /var/log/disk_check.log 2>&1"
#     minute: "*/15"
#     hour: "*"
#     state: present
