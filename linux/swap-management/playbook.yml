---
- name: Swap Management
  hosts: "{{ target_hosts }}"
  become: true
  gather_facts: true
  vars_files:
    - vars/main.yml

  tasks:
    # ── Disable swap ────────────────────────────────────────────────────────
    - name: Disable all swap
      ansible.builtin.command: swapoff -a
      when: not swap_enabled | bool
      changed_when: true

    - name: Remove swap from /etc/fstab when disabling
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '\sswap\s'
        state: absent
      when: not swap_enabled | bool

    # ── Create/enable swap file ─────────────────────────────────────────────
    - name: Check if swap file exists
      ansible.builtin.stat:
        path: "{{ swap_file_path }}"
      register: swap_file_stat
      when: swap_enabled | bool

    - name: Create swap file
      ansible.builtin.command: dd if=/dev/zero of={{ swap_file_path }} bs=1M count={{ swap_file_size_mb }}
      when:
        - swap_enabled | bool
        - not swap_file_stat.stat.exists

    - name: Set swap file permissions
      ansible.builtin.file:
        path: "{{ swap_file_path }}"
        owner: root
        group: root
        mode: '0600'
      when: swap_enabled | bool

    - name: Format swap file
      ansible.builtin.command: mkswap {{ swap_file_path }}
      when:
        - swap_enabled | bool
        - not swap_file_stat.stat.exists

    - name: Enable swap file
      ansible.builtin.command: swapon {{ swap_file_path }}
      when:
        - swap_enabled | bool
        - not swap_file_stat.stat.exists
      changed_when: true

    - name: Add swap file to /etc/fstab
      ansible.posix.mount:
        src: "{{ swap_file_path }}"
        path: none
        fstype: swap
        opts: sw
        state: present
      when: swap_enabled | bool

    # ── Configure swappiness ────────────────────────────────────────────────
    - name: Set vm.swappiness
      ansible.posix.sysctl:
        name: vm.swappiness
        value: "{{ vm_swappiness }}"
        sysctl_file: /etc/sysctl.d/99-swap.conf
        state: present
        reload: true
      when: swap_enabled | bool

    - name: Set vm.vfs_cache_pressure
      ansible.posix.sysctl:
        name: vm.vfs_cache_pressure
        value: "{{ vm_vfs_cache_pressure }}"
        sysctl_file: /etc/sysctl.d/99-swap.conf
        state: present
        reload: true
      when: swap_enabled | bool

    - name: Show swap status
      ansible.builtin.command: swapon --show
      register: swap_status
      changed_when: false

    - name: Display swap status
      ansible.builtin.debug:
        var: swap_status.stdout_lines
