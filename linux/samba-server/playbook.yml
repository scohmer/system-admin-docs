---
- name: Samba Server Configuration
  hosts: "{{ target_hosts }}"
  become: true
  gather_facts: true
  vars_files:
    - vars/main.yml

  tasks:
    - name: Install Samba (Debian)
      ansible.builtin.apt:
        name:
          - samba
          - samba-common-bin
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install Samba (RedHat)
      ansible.builtin.dnf:
        name:
          - samba
          - samba-common
          - samba-client
        state: present
      when: ansible_os_family == "RedHat"

    - name: Create share directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: "{{ item.mode | default('0755') }}"
      loop: "{{ samba_shares }}"

    - name: Deploy smb.conf
      ansible.builtin.template:
        src: smb.conf.j2
        dest: /etc/samba/smb.conf
        owner: root
        group: root
        mode: '0644'
        backup: true
        validate: 'testparm -s %s'
      notify: Restart Samba

    - name: Create Samba system users
      ansible.builtin.user:
        name: "{{ item.username }}"
        system: true
        shell: /sbin/nologin
        create_home: false
      loop: "{{ samba_users }}"
      when: samba_users | length > 0

    - name: Set Samba user passwords
      ansible.builtin.shell: |
        echo -e "{{ item.password }}\n{{ item.password }}" | smbpasswd -s -a {{ item.username }}
      loop: "{{ samba_users }}"
      when: samba_users | length > 0
      no_log: true
      changed_when: true

    - name: Enable Samba users
      ansible.builtin.command: smbpasswd -e {{ item.username }}
      loop: "{{ samba_users }}"
      when: samba_users | length > 0
      changed_when: true

    - name: Enable and start Samba services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - smbd
        - nmbd

    - name: Open Samba ports in firewalld (RedHat)
      ansible.posix.firewalld:
        service: samba
        permanent: true
        state: enabled
        immediate: true
      when:
        - ansible_os_family == "RedHat"
        - samba_firewall_manage | bool

    - name: Open Samba ports in UFW (Debian)
      community.general.ufw:
        rule: allow
        name: Samba
      when:
        - ansible_os_family == "Debian"
        - samba_firewall_manage | bool

  handlers:
    - name: Restart Samba
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - smbd
        - nmbd
